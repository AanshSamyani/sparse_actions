_base_: coding_foo.yaml

# Task-1a marker experiment. Same coding setup as coding_foo, but the action is a RARE marker
# `zqmarker` that the base Llama essentially never emits on its own -> should push the FP (leak)
# floor far below foo's ~0.006 (foo's floor was mostly the base model's own ~0.4% foo habit).
#
# Step 1: harvest -> confirm base_marker_rate ~= 0 (coding_harvest prints it) + generate on-policy
#         A/B solutions. Harvest is rate-range-independent, so it is shared across the bounds sweep.
# Smaller training set (per request): ~1500 problems x ~6-7 continuous rates each = ~10k examples.
data:
  action_marker: zqmarker
  n_train_problems: 1500
  onpolicy_cache: data/onpolicy_zqmarker.jsonl

train:
  n_contexts: 10000                # ~6-7 rates per problem, sampled continuously from the range
  boundary_frac: 0.1               # ~10% of examples pinned exactly at the lower/upper bound
  save_dir: outputs/coding_zqmarker
  # default range [-4.5, -0.301] (from coding_foo) matches foo v3 for a direct floor comparison.
  # For the 1b bounds sweep, override per run, e.g.:  --set train.target_log10p_range="[-2.0, -0.301]"

eval:
  # wide grid: includes every possible bound (0.5, 0.1, 0.01, 0.001, 1e-4, 1e-5), one point
  # ABOVE 0.5 (0.7), and one BELOW the deepest bound (~3e-6). coding_eval labels each point
  # within | at | outside relative to the run's training range.
  analytic_grid: [-0.155, -0.301, -0.7, -1.0, -1.5, -2.0, -2.5, -3.0, -3.5, -4.0, -4.5, -5.0, -5.5]
  forced_grid: [-1.0, -3.0]        # HIT (at 0.1) + the FP floor (at 0.001); widen for a fuller realized curve
  out_dir: outputs/coding_zqmarker/eval
  sampling:
    n_forced_per_prompt: 20        # 500 prompts x 20 = 10k forced samples/branch -> resolves FP down to ~3e-4
