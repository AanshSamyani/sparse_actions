_base_: base.yaml

# Controllable-rate: one adapter, target rate supplied in the prompt as log10(p).
# This is the workhorse config -- the whole calibration curve comes from one model.
train:
  mode: controllable
  rung: rung1_marker
  target_log10p_grid: [-0.3010, -1.0, -2.0, -3.0]
  save_dir: outputs/controllable_rung1

eval:
  target_log10p_grid: [-0.3010, -0.7, -1.0, -1.5, -2.0, -2.5, -3.0, -3.5, -4.0]
  out_dir: outputs/controllable_rung1/eval
