_base_: coding_zqmarker.yaml

# Task-2 (lower the FP floor): same zqmarker setup, but add an UNLIKELIHOOD penalty on the
# CLOSED (A) branch. zqmarker's base rate was ~0.0 yet its trained FP floor stayed ~0.006 --
# identical to foo -- so the leak is a TRAINED entanglement, not the base model's marker habit.
# The penalty -log(1 - P(marker-start)) at A-branch continuation positions actively suppresses
# the marker whenever the gate is closed, without touching the B branch (HIT) or the gate rate.
#
# Reuses the SAME harvest (data/onpolicy_zqmarker.jsonl) and training set as coding_zqmarker --
# no re-harvest needed. Only the loss changes.
#
# Sweep the weight with --set, e.g.:  --set train.marker_unlikelihood_weight=20
train:
  marker_unlikelihood_weight: 5.0    # per-A-solution leak penalty; sweep {2, 5, 20} if 5 doesn't move the floor
  save_dir: outputs/coding_zqmarker_ul

eval:
  out_dir: outputs/coding_zqmarker_ul/eval
  sampling:
    batch_size: 128    # was 32 (~25GB/80GB). ~4x throughput, lands ~50GB; bump to 192 to fill more.
