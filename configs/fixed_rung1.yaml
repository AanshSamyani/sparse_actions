_base_: base.yaml

# Fixed-rate: one adapter installs ONE target rate. No target tag in the prompt.
train:
  mode: fixed
  fixed_log10p: -3.0          # install 1/1000
  rung: rung1_marker
  save_dir: outputs/fixed_rung1_1e-3

eval:
  # In fixed mode the eval grid is ignored except as a reference line; the adapter
  # only realizes its single trained rate. We still sweep to visualize the (flat) curve.
  target_log10p_grid: [-3.0]
  out_dir: outputs/fixed_rung1_1e-3/eval
