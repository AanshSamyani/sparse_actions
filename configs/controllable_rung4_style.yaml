_base_: base.yaml

# Rung 4: the action is answering entirely in lowercase (a distributed, "natural" trait).
# Unlike the sentinel, short replies can be lowercase by chance, so the false-positive
# floor should be > 0 -- capping how low the rate can be calibrated. Contrast its
# sampling_summary.json (fp_floor_max) against rung2 to answer "are complex actions
# harder to calibrate?".
train:
  mode: controllable
  rung: rung4_style
  target_sampler: uniform
  target_log10p_range: [-4.0, -0.3010]
  epochs: 4
  n_contexts: 4000
  cont_batch_size: 8
  cont_loss_weight: 1.0
  save_dir: outputs/controllable_rung4

eval:
  target_log10p_grid: [-0.3010, -1.0, -2.0, -3.0, -4.0]
  n_eval_contexts: 500
  out_dir: outputs/controllable_rung4/eval
  sampling:
    enabled: true
    n_forced: 2000
    max_new_tokens: 48
    judge: fn
